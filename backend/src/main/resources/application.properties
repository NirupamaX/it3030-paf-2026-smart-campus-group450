spring.application.name=backend
server.port=8082

# ── Database (H2 in-memory) ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:campusx;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Reduce noisy non-blocking startup warning from explicit AuthenticationProvider wiring
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ── CampusX Security ───────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CampusXSecretKeyCampusXSecretKeyCampusXSecretKey1234}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# OAuth2 (set real credentials via env vars in production)
spring.security.oauth2.client.registration.google.client-id=116032384653-fpamv4ccv5s4r1ar1udt34vrg4eue62b.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Uploads
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Frontend redirect URL after OAuth login
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Rate limiting (per IP, sliding window)
app.rate-limit.requests=${RATE_LIMIT_REQUESTS:100}
app.rate-limit.window-seconds=${RATE_LIMIT_WINDOW_SECONDS:60}

# Audit logging
logging.level.AUDIT=INFO

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:sathyamadhubhashinivithanage@gmail.com}
spring.mail.password=${MAIL_PASSWORD:evwtibjiieffhwwb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# OTP expiry in minutes
app.otp.expiry-minutes=5

# Mail debug
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG
