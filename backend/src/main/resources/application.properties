spring.application.name=backend
server.port=8082

# ── Database ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/campusx
spring.datasource.username=root
spring.datasource.password=Nirupama
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Reduce noisy non-blocking startup warning from explicit AuthenticationProvider wiring
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# ── CampusX Security ───────────────────────────────────────────
app.jwt.secret=CampusXSecretKeyCampusXSecretKeyCampusXSecretKey1234
app.jwt.expiration-ms=86400000

# OAuth-ready placeholders (replace with real credentials)
spring.security.oauth2.client.registration.google.client-id=change-me-google-client-id
spring.security.oauth2.client.registration.google.client-secret=change-me-google-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Uploads
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Frontend redirect URL after OAuth login
app.frontend.base-url=http://localhost:3000
